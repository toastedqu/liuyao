<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>《增删卜易》六爻占卜</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main>
      <h1>《增删卜易》六爻占卜</h1>
      <p>时区固定为 Asia/Shanghai。六爻按初爻至上爻输入，初爻在下、上爻在上。</p>

      <form id="divination-form">
        <label for="question">所占之事</label>
        <textarea
          id="question"
          maxlength="500"
          placeholder="请在这里写清楚所问的人、事及关系。"
          required
        ></textarea>

        <label for="useful-god">用神</label>
        <select id="useful-god" name="useful_god" required>
          <option value="" selected disabled>请选择用神</option>
          <option value="世爻">世爻（问自身或以自己为主）</option>
          <option value="应爻">应爻（问对方或外人）</option>
          <option value="父母">父母（父母、长辈、文书、宅舍等）</option>
          <option value="兄弟">兄弟（兄弟姐妹、同辈等）</option>
          <option value="官鬼">官鬼（丈夫、功名、官府等）</option>
          <option value="妻财">妻财（妻子、财物等）</option>
          <option value="子孙">子孙（子女、晚辈、医药等）</option>
        </select>
        <small>
          只选择用神类别；若卦中同类爻两现，具体主用爻由系统依据《增删卜易》确定。
          婚恋通常男问女取妻财，女问男取官鬼。
        </small>

        <fieldset>
          <legend>公历时间（Asia/Shanghai）</legend>
          <div class="date-fields">
            <label>年 <input id="year" type="number" min="1" max="9999" required></label>
            <label>月 <input id="month" type="number" min="1" max="12" required></label>
            <label>日 <input id="day" type="number" min="1" max="31" required></label>
            <label>时 <input id="hour" type="number" min="0" max="23" required></label>
          </div>
        </fieldset>

        <fieldset id="lines">
          <legend>六爻（初爻在下、上爻在上）</legend>
        </fieldset>

        <button id="submit" type="submit">排盘并断卦</button>
      </form>

      <p id="error" role="alert" hidden></p>
      <section id="result" aria-live="polite" hidden></section>
    </main>
    <script src="/static/app.js" defer></script>
  </body>
</html>
